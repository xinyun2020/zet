name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck -x -S warning -e SC2294,SC2034 bin/zet core/*.sh hooks/*.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x bin/zet core/*.sh tests/*.sh hooks/*.sh

      - name: Validate templates
        run: ./bin/zet validate

      - name: Run tests
        run: ./bin/zet test

      - name: Scan for dead code
        run: ./bin/zet scan
